{% load static %}

<!-- Відкриваємо ліву колонку контактів. -->
<aside class="chat-contacts">
    <!-- Показуємо кнопку майбутнього створення групового чату. -->
    <button class="create-group-chat" type="button">Створити груповий чат</button>
    <!-- Відкриваємо блок списку контактів. -->
    <section class="chat-block">
        <!-- Показуємо заголовок блоку контактів. -->
        <form class="search-contacts-form">
            <h2>Контакти</h2>
            <input type="text" name="search" placeholder="Пошук">
        </form>

        <!-- Перебираємо друзів поточного користувача. -->
        {% for friend in friends %}
            <div class="contact-item">
                <img src="{% static 'media/avatar_example.png' %}" alt="Аватар {{ friend.email }}" class="contact-avatar">

                <!-- Показуємо кнопку відкриття чату з другом. -->
                <button type="button" class="chat-user-button" data-chat-user="{{ friend.id }}" data-chat-username="{{ friend.email }}">
                    <!-- Показуємо username або email друга. -->
                    {{ friend.email }}
                </button>
            </div>
        <!-- Якщо друзів немає. -->
        {% empty %}
            <!-- Показуємо порожній стан контактів. -->
            <p>Контактів поки немає</p>
        <!-- Закриваємо цикл друзів. -->
        {% endfor %}
    </section>
</aside>
