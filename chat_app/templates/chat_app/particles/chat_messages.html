<!-- Відкриваємо блок особистих повідомлень. -->
<section class="chat-block">
    <!-- Показуємо заголовок блоку повідомлень. -->
    <h2>Повідомлення</h2>
    <!-- Перебираємо особисті чати поточного користувача. -->
    {% for chat in personal_chats %}
        <!-- Перебираємо користувачів конкретного чату. -->
        {% for person in chat.users.all %}
            <!-- Пропускаємо поточного користувача. -->
            {% if person.id != request.user.id %}
                <!-- Показуємо кнопку відкриття чату зі співрозмовником. -->
                <button type="button" class="chat-user-button" data-chat-user="{{ person.id }}" data-chat-username="{{ person.email }}">
                    <!-- Показуємо username або email співрозмовника. -->
                    {{  person.email }}
                </button>
            <!-- Закриваємо умову пропуску поточного користувача. -->
            {% endif %}
        <!-- Закриваємо цикл користувачів чату. -->
        {% endfor %}
    <!-- Якщо особистих чатів немає. -->
    {% empty %}
        <!-- Показуємо порожній стан повідомлень. -->
        <p>Чатів поки немає</p>
    <!-- Закриваємо цикл чатів. -->
    {% endfor %}
</section>
