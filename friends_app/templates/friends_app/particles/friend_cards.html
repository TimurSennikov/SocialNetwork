<!-- Перебираємо людей, яких передав backend. -->
{% for person in users %}
    <!-- Картка людини з обводкою і шириною для 3 карток у ряд. -->
    <article class="friend-card" data-person-id="{{ person.id }}">
        <!-- Показуємо username, а якщо його немає - email. -->
        <h3>{% firstof person.username person.email %}</h3>
        <!-- Показуємо email як простий підпис без аватарки. -->
        <p>{{ person.email }}</p>

        <!-- Для запитів показуємо підтвердження і відхилення. -->
        <div class="actions">
            {% if section == "requests" %}
                <!-- Підтверджуємо вхідний запит. -->
                <button type="button" data-friend-action data-url="{% url 'friend_action' person.id 'accept' %}" class="filled">Підтвердити</button>
                <!-- Видаляємо вхідний запит. -->
                <button type="button" data-friend-action data-url="{% url 'friend_action' person.id 'delete' %}" class="outlined">Відхилити</button>
            <!-- Для рекомендацій показуємо додавання і видалення з рекомендацій. -->
            {% elif section == "recommendations" %}
                <!-- Надсилаємо запит у друзі. -->
                <button type="button" data-friend-action data-url="{% url 'friend_action' person.id 'add' %}" class="filled">Додати</button>
                <!-- Прибираємо картку зі списку рекомендацій. -->
                <button type="button" data-friend-action data-url="{% url 'friend_action' person.id 'dismiss' %}" class="outlined">Видалити</button>
            <!-- Для друзів показуємо повідомлення і видалення. -->
            {% else %}
                <!-- Кнопка для майбутнього переходу в чат. -->
                <button type="button" class="filled">Повідомлення</button>
                <!-- Видаляємо користувача з друзів. -->
                <button type="button" data-friend-action data-url="{% url 'friend_action' person.id 'delete' %}" class="outlined">Видалити</button>
            <!-- Закриваємо умови кнопок для типу списку. -->
            {% endif %}
        </div>  
    </article>
<!-- Якщо список порожній. -->
{% empty %}
    <!-- Показуємо короткий текст порожнього стану. -->
    <p>Порожньо</p>
<!-- Закриваємо перебір людей. -->
{% endfor %}
